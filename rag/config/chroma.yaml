# ============================================================================
# Example: Chroma Vector Store Configuration
# ============================================================================
# This configuration uses Chroma as the vector store backend
# ============================================================================

llm:
  provider: ollama
  model: llama3-instruct-8k
  base_url: "http://localhost:11434"
  context_window: 8192
  temperature: 0.0
  max_tokens: 512

embedding:
  provider: ollama
  model: "nomic-embed-text:v1.5"
  base_url: "http://localhost:11434"

vector_store:
  provider: chroma
  persist_directory: "./chroma_db"
  collection_name: documents
  # For remote Chroma server:
  # chroma_host: "localhost"
  # chroma_port: 8000

chunking:
  chunk_size: 512
  chunk_overlap: 50

retrieval:
  use_hybrid_search: true
  top_k: 5
  reranker:
    enabled: true
    model: "BAAI/bge-reranker-base"
    top_n: 3

directories:
  documents_dir: "./documents"
  vector_store_dir: "./chroma_db"

prompt_template: default
