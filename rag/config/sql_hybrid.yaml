# ============================================================================
# RAG Framework - SQL + Hybrid Mode Configuration Example
# ============================================================================
# This configuration enables the hybrid query system with SQL database support.
# Copy this file and modify according to your database setup.
# ============================================================================

# LLM Configuration (same as standard config)
llm:
  provider: ollama
  model: llama3-instruct-8k
  base_url: "http://localhost:11434"
  context_window: 8192
  temperature: 0.0
  max_tokens: 512
  request_timeout: 120.0

# Embedding Configuration (same as standard config)
embedding:
  provider: ollama
  model: "nomic-embed-text:v1.5"
  base_url: "http://localhost:11434"

# Vector Store Configuration
vector_store:
  provider: lancedb
  persist_directory: "./vector_store"
  collection_name: documents

# Chunking Configuration
chunking:
  chunk_size: 1536
  chunk_overlap: 200

# Retrieval Configuration
retrieval:
  use_hybrid_search: true
  top_k: 10
  alpha: 0.5
  reranker:
    enabled: true
    model: "BAAI/bge-reranker-base"
    top_n: 5

# Directory Configuration
directories:
  documents_dir: "./documents"
  vector_store_dir: "./vector_store"

# Prompt Template
prompt_template: default

# Debug Mode
debug: false

# ============================================================================
# SQL DATABASE CONFIGURATION
# ============================================================================
# Configure this section to enable SQL querying capabilities.

sql:
  # Enable SQL functionality
  enabled: true
  
  # Database connection settings
  connection:
    # Option 1: SQLite (simplest setup)
    db_type: sqlite
    sqlite_path: "./data/example.db"
    
    # Option 2: PostgreSQL
    # db_type: postgresql
    # host: localhost
    # port: 5432
    # database: myapp
    # username: user
    # password: password
    
    # Option 3: MySQL
    # db_type: mysql
    # host: localhost
    # port: 3306
    # database: myapp
    # username: user
    # password: password
    
    # Connection pool settings
    pool_size: 5
    query_timeout: 30.0
  
  # Schema configuration
  schema:
    # Specify tables to include (empty = all tables)
    include_tables: []
    
    # Tables to exclude from queries
    exclude_tables:
      - "_migrations"
      - "django_*"
      - "auth_*"
    
    # Include sample values for better SQL generation
    include_sample_values: true
    sample_values_limit: 5
    
    # Include foreign key relationships
    include_relationships: true
    
    # Custom table descriptions (helps the LLM understand context)
    table_descriptions:
      users: "User accounts with profile information"
      orders: "Customer purchase orders"
      products: "Product catalog"
      # Add more table descriptions as needed
    
    # Custom column descriptions
    column_descriptions:
      users:
        status: "Active status: 'active', 'inactive', 'suspended'"
        role: "User role: 'admin', 'user', 'guest'"
      orders:
        status: "Order status: 'pending', 'shipped', 'delivered', 'cancelled'"
  
  # Security settings (IMPORTANT - DO NOT RELAX THESE IN PRODUCTION)
  security:
    # Only allow SELECT statements (highly recommended)
    allow_only_select: true
    
    # Maximum rows to return per query
    max_rows: 100
    
    # Maximum query execution time (seconds)
    max_execution_time: 30.0
  
  # SQL generation settings
  max_retries: 3
  
  # Example queries for few-shot learning (improves SQL generation quality)
  example_queries:
    - question: "How many users are there?"
      sql: "SELECT COUNT(*) FROM users"
    
    - question: "List the top 5 products by price"
      sql: "SELECT name, price FROM products ORDER BY price DESC LIMIT 5"
    
    - question: "Show orders from last month"
      sql: "SELECT * FROM orders WHERE created_at >= date('now', '-1 month') ORDER BY created_at DESC"

# ============================================================================
# QUERY ROUTER CONFIGURATION
# ============================================================================
# The router automatically determines whether to use documents, SQL, or both.

router:
  # Enable intelligent routing
  enabled: true
  
  # Default source when routing is uncertain
  default_source: unstructured
  
  # Use LLM for ambiguous queries (recommended for better accuracy)
  use_llm_fallback: true
  
  # Confidence threshold for rule-based routing
  # Lower = more LLM calls but better accuracy
  # Higher = faster but may misroute some queries
  confidence_threshold: 0.7
  
  # Domain-specific keywords that indicate SQL queries
  structured_keywords:
    - "users"
    - "orders"
    - "products"
    - "revenue"
    - "sales"
    - "inventory"
    - "transactions"
  
  # Domain-specific keywords that indicate document queries
  unstructured_keywords:
    - "policy"
    - "procedure"
    - "guideline"
    - "regulation"
    - "documentation"
