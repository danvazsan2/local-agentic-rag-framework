# ============================================================================
# Example: HuggingFace Configuration
# ============================================================================
# This configuration uses HuggingFace models instead of Ollama
# Requires a GPU for optimal performance
# ============================================================================

llm:
  provider: huggingface
  model: "mistralai/Mistral-7B-Instruct-v0.2"
  hf_model_id: "mistralai/Mistral-7B-Instruct-v0.2"
  # hf_token: null  # Set via HF_TOKEN env var for gated models
  device: auto      # auto, cuda, cpu, mps
  context_window: 4096
  temperature: 0.1
  top_p: 0.9
  top_k: 40
  max_tokens: 512
  repeat_penalty: 1.1
  request_timeout: 300.0  # Longer timeout for HF models

embedding:
  provider: huggingface
  model: "sentence-transformers/all-mpnet-base-v2"
  hf_model_id: "sentence-transformers/all-mpnet-base-v2"
  device: auto

vector_store:
  provider: lancedb
  persist_directory: "./vector_store"
  collection_name: documents

chunking:
  chunk_size: 512
  chunk_overlap: 50

retrieval:
  use_hybrid_search: true
  top_k: 5
  alpha: 0.5
  reranker:
    enabled: true
    model: "BAAI/bge-reranker-base"
    top_n: 3

directories:
  documents_dir: "./documents"
  vector_store_dir: "./vector_store"
