llm:
  provider: ollama
  model: llama3-instruct-8k
  base_url: http://localhost:11434
  hf_model_id: null
  hf_token: null
  device: auto
  local_model_path: null
  is_local: false
  context_window: 8192
  temperature: 0.0
  top_p: 0.9
  top_k: 40
  max_tokens: 512
  repeat_penalty: 1.15
  stop_sequences:
  - '


    Pregunta:'
  - '


    Usuario:'
  - '


    Contexto:'
  request_timeout: 120.0
embedding:
  provider: ollama
  model: nomic-embed-text:v1.5
  base_url: http://localhost:11434
  hf_model_id: null
  hf_token: null
  device: auto
  local_model_path: null
  is_local: false
  dimensions: null
vector_store:
  provider: lancedb
  persist_directory: ./vector_store
  collection_name: documents
  lance_mode: overwrite
  chroma_host: null
  chroma_port: null
  faiss_index_type: flat
  qdrant_url: null
  qdrant_api_key: null
  pinecone_api_key: null
  pinecone_environment: null
  pinecone_index_name: null
chunking:
  chunk_size: 512
  chunk_overlap: 50
  separator: ' '
retrieval:
  use_hybrid_search: true
  top_k: 5
  alpha: 0.5
  rrf_k: 60
  reranker:
    enabled: true
    provider: huggingface
    model: BAAI/bge-reranker-base
    top_n: 3
    device: auto
    local_model_path: null
    is_local: false
directories:
  documents_dir: ./documents
  vector_store_dir: ./vector_store
sql:
  enabled: false
  connection:
    db_type: sqlite
    sqlite_path: null
    host: localhost
    port: null
    database: null
    username: null
    password: null
    pool_size: 5
    max_overflow: 10
    pool_timeout: 30.0
    query_timeout: 30.0
  schema:
    include_tables: []
    exclude_tables: []
    include_descriptions: true
    include_sample_values: true
    sample_values_limit: 5
    include_relationships: true
    table_descriptions: {}
    column_descriptions: {}
  security:
    allow_only_select: true
    max_rows: 100
    max_execution_time: 30.0
    forbidden_patterns:
    - ;\s*DROP\s+
    - ;\s*DELETE\s+
    - ;\s*UPDATE\s+
    - ;\s*INSERT\s+
    - ;\s*ALTER\s+
    - ;\s*CREATE\s+
    - ;\s*TRUNCATE\s+
    - --
    - /\*
    - EXEC\s*\(
    - EXECUTE\s*\(
    - xp_
    - sp_
    allowed_functions:
    - COUNT
    - SUM
    - AVG
    - MIN
    - MAX
    - ROUND
    - COALESCE
    - NULLIF
    - CAST
    - LOWER
    - UPPER
    - TRIM
    - SUBSTRING
    - DATE
    - YEAR
    - MONTH
    - DAY
    - LENGTH
    - CONCAT
    - REPLACE
  max_retries: 3
  example_queries: []
router:
  enabled: false
  default_source: unstructured
  use_llm_fallback: true
  confidence_threshold: 0.7
  structured_keywords: []
  unstructured_keywords: []
corrective_rag:
  enabled: false
  relevance_threshold: 0.5
  max_retries: 1
prompt_template: default
custom_prompt: null
debug: false
