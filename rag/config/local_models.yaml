# ============================================================================
# RAG Framework Configuration - Local HuggingFace Models Example
# ============================================================================
# This example shows how to use local HuggingFace models for offline RAG.
# Download models first using: python run_rag.py download <type> <model_id>
# ============================================================================

# ----------------------------------------------------------------------------
# LLM Configuration - Using Local Model
# ----------------------------------------------------------------------------
llm:
  provider: huggingface
  local_model_path: "./models/llm/TinyLlama--TinyLlama-1.1B-Chat-v1.0"
  device: auto  # auto, cuda, cpu, mps
  
  # Generation parameters
  context_window: 2048
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  max_tokens: 512
  repeat_penalty: 1.15
  
  request_timeout: 120.0

# ----------------------------------------------------------------------------
# Embedding Configuration - Using Local Model
# ----------------------------------------------------------------------------
embedding:
  provider: huggingface
  local_model_path: "./models/embedding/sentence-transformers--all-MiniLM-L6-v2"
  device: auto

# ----------------------------------------------------------------------------
# Vector Store Configuration
# ----------------------------------------------------------------------------
vector_store:
  provider: lancedb
  persist_directory: "./vector_store"
  collection_name: documents
  lance_mode: overwrite

# ----------------------------------------------------------------------------
# Document Chunking Configuration
# ----------------------------------------------------------------------------
chunking:
  chunk_size: 512
  chunk_overlap: 50

# ----------------------------------------------------------------------------
# Retrieval Configuration
# ----------------------------------------------------------------------------
retrieval:
  use_hybrid_search: true
  top_k: 5
  alpha: 0.5
  rrf_k: 60
  
  # Reranker - Using Local Model
  reranker:
    enabled: true
    local_model_path: "./models/reranker/BAAI--bge-reranker-base"
    top_n: 3
    device: auto

# ----------------------------------------------------------------------------
# Directory Configuration
# ----------------------------------------------------------------------------
directories:
  documents_dir: "./documents"
  vector_store_dir: "./vector_store"

# ----------------------------------------------------------------------------
# Prompt Template
# ----------------------------------------------------------------------------
prompt_template: default

# ----------------------------------------------------------------------------
# Debug Mode
# ----------------------------------------------------------------------------
debug: false
