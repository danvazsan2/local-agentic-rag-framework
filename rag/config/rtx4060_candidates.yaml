# config/rtx4060_candidates.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Candidatos a nuevos defaults — RTX 4060 8 GB
#   LLM       : qwen3:8b          (Ollama, ~5.2 GB VRAM, thinking desactivado)
#   Embedding : bge-m3:latest     (Ollama, ~1.2 GB VRAM, multilingüe, 1024 dims)
#   Reranker  : qllama/bge-reranker-v2-m3:latest  (Ollama, ~635 MB, multilingüe)
# ─────────────────────────────────────────────────────────────────────────────

llm:
  provider: ollama
  model: qwen3:8b
  base_url: http://localhost:11434
  context_window: 8192       # qwen3 soporta hasta 32K; dejamos margen
  temperature: 0.0
  top_p: 0.9
  top_k: 40
  max_tokens: 1024            # antes: 512 — suficiente para la mayoría de respuestas RAG
  repeat_penalty: 1.1         # antes: 1.15 — menos agresivo, evita penalizar listas largas
  request_timeout: 300.0      # antes: 120 — margen para Map-Reduce sobre 75 chunks
  thinking: false             # CRÍTICO: desactiva chain-of-thought en qwen3 (de lo contrario
                              # inserta bloques <think>...</think> que multiplican latencia)
  stop_sequences:
    - "\n\nPregunta:"
    - "\n\nUsuario:"
    - "\n\nContexto:"

embedding:
  provider: ollama
  model: bge-m3:latest
  base_url: http://localhost:11434
  # bge-m3: multilingüe, 1024 dims, ventana de 8192 tokens
  # NOTA: cambiar el modelo de embedding requiere re-indexar todos los documentos

vector_store:
  provider: lancedb
  persist_directory: ./vector_store_rtx4060  # directorio separado para no sobreescribir el actual
  collection_name: documents_rtx4060
  lance_mode: overwrite

chunking:
  chunk_size: 1536
  chunk_overlap: 200
  use_semantic_chunking: true
  semantic_oversized_factor: 1.5

retrieval:
  use_hybrid_search: true
  top_k: 15                   # antes: 10 — más candidatos entran al reranker
  alpha: 0.5                  # 0 = solo BM25, 1 = solo vector; 0.5 equilibrado
  rrf_k: 80                   # antes: 60 — suaviza diferencias pequeñas de ranking
  reranker:
    enabled: true
    provider: huggingface       # FlagEmbeddingReranker carga el modelo directo en CUDA
    model: BAAI/bge-reranker-v2-m3
    local_model_path: ./models/bge-reranker-v2-m3
    device: auto               # usa CUDA automáticamente si está disponible
    top_n: 7                  # antes: 5 — más contexto disponible para el LLM

sql:
  enabled: true
  connection:
    db_type: sqlite
    sqlite_path: ./data/proyectos_docentes.db
    pool_size: 5
    query_timeout: 30.0
  schema:
    include_descriptions: true
    include_sample_values: true
    sample_values_limit: 3
    include_relationships: true
  security:
    allow_only_select: true
    max_rows: 100
    max_execution_time: 30.0
  max_retries: 3

router:
  enabled: true
  confidence_threshold: 0.7
  use_llm_fallback: true

prompt_template: default
debug: false
